# radsafety-laws 워치리스트 — 감시 대상 법령의 단일 권위(source of truth)
#
# 이 파일이 "어떤 법을 추적하는가"의 유일한 정의다. fetch 스크립트(update_laws.sh)와
# 신선도 감사(_freshness_audit.py)가 모두 여기서 목록을 읽는다 — 하드코딩 금지.
#
# ──────────────────────────────────────────────────────────────────────────
# 포함 기준 (inclusion criterion) — 새 법을 넣을지 말지의 단일 게이트:
#
#   "이 법(본문)이 방사선·방사성물질 *자체*를 규율하는 조항을 갖는가?"
#
#   ✓ YES → 포함.  예) 의료기사법(방사선사=방사선 취급 면허 규정),
#                       약사법(제54조 방사성의약품), 원자력안전법(방사선작업종사자).
#   ✗ "직업이 방사선에 노출될 뿐" → 제외.
#       예) 간호법 — 본문에 방사선/방사성 0회. 핵의학 병동 간호사의 방사선 보호는
#           간호법이 아니라 원자력안전법(방사선작업종사자)·진단용방사선규칙
#           (방사선 관계 종사자)이 이미 커버한다. 간호법을 넣으면 방사선 무관
#           면허·업무 조항만 늘 뿐.
#   이 게이트가 없으면 "방사선 노출 직종의 법"으로 번져 의료법·산업안전보건법·
#   응급의료법까지 무한 확장된다. 게이트가 경계를 원칙 있게 닫는다.
# ──────────────────────────────────────────────────────────────────────────
#
# 구조: 한 [[family]] = 독립 법률(Act) 1그루. members = 그 법률 + 위임 하위법령
#   (시행령·시행규칙·부령). 법률들 사이엔 위계 없음(서로 대등) — 7그루 숲.
#   name   = legalize-kr raw 경로용 무공백 법령명 (BASE/<name>/<type>.md)
#   type   = 법률 | 시행령 | 시행규칙 | 보건복지부령 | 총리령 ...
#   law_id = law.go.kr 법령ID(버전 무관 불변 앵커 — 신선도 감사 키)

