# radsafety-laws 워치리스트 — 감시 대상 법령의 단일 권위(source of truth)
#
# 이 파일이 "어떤 법을 추적하는가"의 유일한 정의다. fetch 스크립트(update_laws.sh)와
# 신선도 감사(_freshness_audit.py)가 모두 여기서 목록을 읽는다 — 하드코딩 금지.
#
# ──────────────────────────────────────────────────────────────────────────
# 스코프 = 의료 방사선 안전 (핵의학·방사선종양·영상의학).  [2026-06-30 확정]
#   ※ 직전 "방사선안전 전반" 확장은 철회(Dr. Ben 착오) — 생활방사선·원전방재·산업·환경·
#     수의·식품 등 *의료에 적용되지 않는* 방사선법은 스코프 밖.
#
# 2-tier 분류 — 두 게이트의 곱:
#   ① 방사선 규율 정도: 법/규칙 전체가 방사선안전인가(whole) vs 일부 조만인가(partial)
#   ② 의료 적용: 핵의학·방종·영상의학 현장에 직접 적용되는가
#
#   tier = "core"       = ①whole + ②의료적용  → whole-law 감시 + 전문(全文) 코퍼스 수집
#   tier = "peripheral" = ①partial + ②의료적용 → 방사선 조(watch_articles)만 (후속 도구; 현재 informational)
#   제외(파일에 안 넣음)  = ②의료 미적용 — '전체가 방사선'이라도 의료 무관이면 제외.
#       핵심: **전체-방사선 ≠ 의료-방사선.** 생활방사선법·방재법은 법 전체가 방사선안전이지만
#       의료 현장에 적용되지 않아 제외(스코프 게이트가 닫는다). 복구용 목록은 파일 끝 주석.
#   따름정리: 모법이 일반(의료법)이라 peripheral 이어도, 그 위임 *방사선 전용 규칙*
#       (진단용방사선규칙)은 규칙 전체가 의료 방사선 → 독립 core.
# ──────────────────────────────────────────────────────────────────────────
#
# 구조: 한 [[family]] = 독립 법률/규칙 1그루. members = 그 법 + 위임 하위법령.
#   act / tier(생략 시 core) / why / watch_articles(peripheral 전용)
#   members[].name = legalize-kr raw 경로용 무공백 법령명, .type, .law_id(law.go.kr 법령ID)
#
# ════════════ TIER 1: CORE (전체가 방사선안전 + 의료 직접 적용) ════════════

[[family]]
act = "원자력안전법"
tier = "core"
why = "핵의학·방사선종양의 방사선안전 근거법 — 방사성동위원소 사용허가·치료기·방사선작업종사자·선량한도·방사선방어. 법 전체가 방사선안전, 의료 RI에 직접 적용"
members = [
  { name = "원자력안전법", type = "법률",   law_id = "011435" },
  { name = "원자력안전법", type = "시행령", law_id = "011484" },
  { name = "원자력안전법", type = "시행규칙", law_id = "011880" },
]

