# 법령(법률·부령)과 달리 고시 *선별*은 키워드 sweep 이 동음이의(방호=경비·소방호스,
# 방재=재난·지방"재"정)로 노이즈가 커 폐기. 의료 방사선 관련 고시를 *사람이 확정한
# 명시 목록*으로 관리한다(2026-06-30, 의료 중심). _collect_admrul.py 가 이 목록을 읽어
# admrule-kr 에서 본문.md 만 수집(키워드 sweep 대체).
#   name   = admrule-kr 폴더명(고시 정식명)         kind = 고시 | 예규 | 훈령
#   agency = admrule-kr 경로(<부처>/<청>)            parent = 위임 근거 core 법(이해용)
#   fetch 경로 = <agency>/<kind>/<name>/본문.md

