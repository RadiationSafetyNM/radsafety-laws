name: Update laws

on:
  schedule:
    - cron: "0 18 * * 0"   # 매주 월요일 03:00 KST (일 18:00 UTC)
  workflow_dispatch: {}     # 수동 실행 버튼

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch laws from legalize-kr
        run: bash scripts/update_laws.sh data/laws

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/laws
          if git diff --cached --quiet; then
            echo "변경 없음 — 커밋 생략"
          else
            git commit -m "chore: 법령 갱신 $(date -u +%Y-%m-%d)"
            git push
          fi
